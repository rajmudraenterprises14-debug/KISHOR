name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Clean Cache and Clean Install
      run: |
        npm cache clean --force
        rm -rf node_modules
        npm i -g @tailwindcss/oxide
        npm install --include=optional

    - name: Build Web App
      run: npm run build

    - name: Install Capacitor CLI & Android
      run: |
        npm install @capacitor/core @capacitor/cli
        npm install @capacitor/android
        npx cap init "Rajmudra Billing" "com.rajmudra.billing" --web-dir=dist || true
        npx cap add android || true

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Fix Kotlin Duplicate Configurations
      run: |
        cd android
        echo "configurations.all { resolutionStrategy.eachDependency { DependencyResolveDetails details -> if (details.requested.group == 'org.jetbrains.kotlin') { details.useVersion '1.9.22' } } }" >> build.gradle

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rajmudra-app-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
